name: Phase 8 Mobile Quality Gate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  mobile-quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm exec tsc -- --noEmit

      - name: Aspect-aware media contract
        run: npm run test:aspect-aware-media

      - name: Brand profile contract
        run: npm run test:brand-profile-contract

      - name: Design editor contract
        run: npm run test:design-editor-contract

      - name: Store API contract
        run: npm run test:store-api-contract

      - name: Performance regression guard
        run: npm run check:perf-regressions
